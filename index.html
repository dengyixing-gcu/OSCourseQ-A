*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#333;height:100vh;display:flex;flex-direction:column}
.header{background:#fff;border-bottom:1px solid #e8e8e8;padding:0 24px;display:flex;align-items:center;height:56px;flex-shrink:0}

.tab.active{background:#1677ff;color:#fff}

.message.user .message-bubble{background:#1677ff;color:#fff;border-bottom-right-radius:4px}
.message.system .message-bubble{background:#fff;border:1px solid #e8e8e8;border-bottom-left-radius:4px}
.message-bubble .section-ref{font-size:12px;color:#1677ff;margin-bottom:4px;font-weight:500}
.message-bubble .title{font-size:16px;font-weight:600;margin-bottom:8px;color:#1a1a1a}

.message-bubble .content ul,.message-bubble .content ol{margin:8px 0 8px 20px}
.message-bubble .content li{margin-bottom:4px}
.message-bubble .content strong{color:#1a1a1a}
.message-bubble .content code{background:#f5f5f5;padding:2px 6px;border-radius:4px;font-size:13px}
.message-bubble .content table{border-collapse:collapse;margin:10px 0;width:100%;font-size:13px}
.message-bubble .content th,.message-bubble .content td{border:1px solid #e8e8e8;padding:6px 10px;text-align:left}
.message-bubble .content th{background:#f5f5f5;font-weight:600}
.message-bubble .content pre{background:#f5f5f5;padding:10px;border-radius:6px;overflow-x:auto;margin:8px 0;font-size:13px;line-height:1.6}
.welcome{text-align:center;padding:60px 20px;color:#999}
.welcome h2{font-size:22px;color:#666;margin-bottom:12px}
.welcome p{font-size:14px;line-height:1.8}
.input-area{padding:16px 24px;background:#fff;border-top:1px solid #e8e8e8;display:flex;gap:12px;flex-shrink:0}
.input-area input{flex:1;padding:10px 16px;border:1px solid #d9d9d9;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s}
.input-area input:focus{border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,.1)}
.input-area button{padding:10px 24px;background:#1677ff;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;transition:background .2s}
.input-area button:hover{background:#4096ff}
.input-area button:active{background:#0958d9}
.input-area button:disabled{background:#d9d9d9;cursor:not-allowed}
.disk-calc{background:#f9fafb;border:1px solid #e8e8e8;border-radius:8px;padding:12px;margin-top:10px}
.disk-calc h4{font-size:14px;color:#1a1a1a;margin-bottom:8px}
.disk-calc input,.disk-calc select{padding:4px 8px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;margin:2px}
.disk-calc button{padding:4px 12px;background:#1677ff;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;margin-left:4px}
.disk-calc .result{margin-top:8px;font-size:13px;line-height:1.6}
.disk-calc .result table{font-size:12px}
.no-match{color:#999;font-style:italic}
.quick-topics{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;justify-content:center}
.quick-topic{padding:6px 14px;background:#fff;border:1px solid #e8e8e8;border-radius:20px;font-size:13px;color:#666;cursor:pointer;transition:all .2s}
.quick-topic:hover{border-color:#1677ff;color:#1677ff;background:#e6f4ff}
.settings-btn{display:none;margin-left:auto;cursor:pointer;font-size:20px;color:#666;padding:4px 8px;border-radius:4px}
.settings-btn:hover{background:#f5f5f5}
.settings-panel{display:none !important}
.loading-dots{display:inline-flex;gap:4px;align-items:center}
.loading-dots span{width:6px;height:6px;background:#1677ff;border-radius:50%;animation:dotPulse 1.4s infinite ease-in-out both}
.loading-dots span:nth-child(1){animation-delay:-.32s}
.loading-dots span:nth-child(2){animation-delay:-.16s}
@keyframes dotPulse{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@media(max-width:768px){.header h1{font-size:16px;margin-right:16px}.message-bubble{max-width:95%}.input-area{padding:12px 16px}}
</style>

<script>
// Knowledge base for context injection
const knowledgeBase = [
{id:"7.1.1",section:"7.1.1",title:"I/O管理的功能",keywords:["I/O管理","I/O管理功能","IO管理","输入输出管理","管理功能"],content:"I/O管理的主要功能包括：设备分配与回收、缓冲区管理、设备驱动、错误处理、提供用户接口。目标是提高I/O速度、方便用户使用、实现设备无关性。"},
{id:"7.1.2",section:"7.1.2",title:"I/O硬件组成",keywords:["I/O硬件","I/O硬件组成","IO硬件","输入输出硬件","硬件组成"],content:"I/O系统由I/O设备、设备控制器、I/O通道、总线、I/O端口组成。I/O通信方式有专用指令I/O和内存映射I/O。"},
{id:"7.1.3",section:"7.1.3",title:"I/O设备",keywords:["I/O设备","IO设备","输入输出设备","设备分类","块设备","字符设备"],content:"I/O设备按使用特性分为存储型、输入/输出型、交互型；按传输速率分为低速、中速、高速；按信息交换单位分为块设备和字符设备；按资源分配分为独占设备、共享设备、虚拟设备。"},
{id:"7.1.4",section:"7.1.4",title:"设备控制器",keywords:["设备控制器","控制器","Device Controller","设备控制"],content:"设备控制器是CPU与I/O设备之间的接口，功能包括：接收和识别命令、数据交换、设备状态报告、地址识别、数据缓冲、差错控制。由命令寄存器、状态寄存器、数据寄存器、控制逻辑组成。"},
{id:"7.1.5",section:"7.1.5",title:"设备通道",keywords:["设备通道","通道","I/O通道","IO通道","通道处理器","channel"],content:"设备通道是专门用于控制I/O操作的处理器。三种类型：字节多路通道（低速设备）、数组选择通道（高速设备）、数组多路通道（多台高速设备）。"},
{id:"7.2.1",section:"7.2.1",title:"程序直接控制方式",keywords:["程序直接控制","程序查询","轮询","忙等待","programmed io","polling"],content:"CPU启动I/O设备后不断循环查询设备状态，等待期间处于忙等待状态。优点：实现简单。缺点：CPU利用率极低，CPU和外设只能串行工作。"},
{id:"7.2.2",section:"7.2.2",title:"中断控制方式",keywords:["中断控制","中断","interrupt","中断驱动"],content:"CPU启动I/O设备后继续执行其他进程，设备完成后发出中断请求。优点：CPU与I/O可并行工作。缺点：每传输一个数据单元就要中断一次CPU，高速设备中断开销大。"},
{id:"7.2.3",section:"7.2.3",title:"DMA控制方式",keywords:["DMA","DMA控制","直接存储器访问","Direct Memory Access"],content:"DMA允许I/O设备与内存之间直接进行数据传输，无需CPU干预。DMA控制器由地址寄存器、数据寄存器、控制逻辑、计数寄存器、控制寄存器组成。传输模式：突发模式、周期窃取模式、透明模式。"},
{id:"7.2.4",section:"7.2.4",title:"通道控制方式",keywords:["通道控制","通道控制方式","channel"],content:"通道控制方式是I/O控制的最高级形式。CPU执行一条I/O指令启动通道，通道独立执行通道程序控制I/O设备。与DMA相比，通道可执行更复杂的操作，有自己的指令系统。"},
{id:"7.2.5",section:"7.2.5",title:"四种I/O控制方式比较",keywords:["四种I/O控制方式比较","I/O控制方式比较","io控制方式对比","io控制方式","控制方式比较"],content:"四种I/O控制方式：程序直接控制（CPU全程参与，效率最低）、中断控制（每字节/字参与，中等效率）、DMA（开始和结束参与，高效率）、通道（仅初始配置，最高效率）。CPU干预程度逐渐降低，系统并行性逐渐提高。"},
{id:"7.3.1",section:"7.3.1",title:"I/O软件层次结构",keywords:["I/O软件层次","I/O软件","io软件层次","设备无关层"],content:"I/O软件分为四层：用户层I/O软件（如stdio库）、设备无关的操作系统软件（设备命名、保护、缓冲）、设备驱动程序（与设备相关）、中断处理程序（最底层接口）。"},
{id:"7.3.2",section:"7.3.2",title:"设备分配",keywords:["设备分配","设备分配策略","独占设备","共享设备","虚拟设备"],content:"独占设备一次只分配给一个进程（如打印机）；共享设备可同时分配给多个进程（如磁盘）；虚拟设备通过SPOOLing技术将独占设备模拟为共享设备。分配步骤：分配设备→分配控制器→分配通道→启动设备。"},
{id:"7.3.3",section:"7.3.3",title:"SPOOLing技术",keywords:["SPOOLing","假脱机","虚拟设备","Simultaneous Peripheral Operations On-Line"],content:"SPOOLing利用磁盘作为缓冲，将独占设备改造为共享设备。组成：输入井和输出井（磁盘）、输入缓冲区和输出缓冲区（内存）、输入进程和输出进程、井管理程序。与Buffering的区别：SPOOLing使用磁盘存储，支持多作业I/O与执行重叠。"},
{id:"7.3.4",section:"7.3.4",title:"设备驱动程序",keywords:["设备驱动程序","驱动程序","Device Driver","driver"],content:"设备驱动程序是内核中直接与硬件交互的模块。功能：接收抽象命令、转换为设备命令、检查设备状态、控制I/O操作。每个设备有对应的驱动程序，向上提供统一接口实现设备无关性。"},
{id:"7.3.5",section:"7.3.5",title:"中断处理程序",keywords:["中断处理程序","中断处理","Interrupt Handler","中断服务程序","ISR"],content:"中断处理过程：保存现场→分析中断原因→执行中断服务例程→恢复现场→返回。类型包括：I/O中断处理、时钟中断处理、硬件故障中断处理、程序性中断处理。"},
{id:"7.4.1",section:"7.4.1",title:"磁盘结构和管理",keywords:["磁盘结构","磁盘","磁道","扇区","柱面","盘片","磁盘访问时间"],content:"磁盘由盘片、磁头、磁道、扇区、柱面组成。磁盘访问时间=寻道时间+旋转延迟+传输时间。磁盘地址由柱面号、磁头号、扇区号确定。"},
{id:"7.4.2",section:"7.4.2",title:"磁盘调度算法",keywords:["磁盘调度","磁盘调度算法","FCFS","SSTF","SCAN","C-SCAN","LOOK","C-LOOK","电梯调度"],content:"主要算法：FCFS（先来先服务）、SSTF（最短寻道时间优先）、SCAN（电梯算法）、C-SCAN（循环扫描）、LOOK、C-LOOK。目标是减少平均寻道时间。"},
{id:"7.4.3",section:"7.4.3",title:"独立磁盘冗余阵列",keywords:["RAID","独立磁盘冗余阵列","磁盘阵列","RAID级别","RAID 0","RAID 1","RAID 5"],content:"RAID技术将多个磁盘组合成逻辑单元。RAID 0（条带化，无冗余）、RAID 1（镜像，50%空间浪费）、RAID 5（分布式奇偶校验，至少3盘）、RAID 6（双重奇偶校验，至少4盘）、RAID 10（1+0，高性能高冗余）。"},
{id:"7.4.4",section:"7.4.4",title:"非易失性存储器",keywords:["非易失性存储器","NVM","SSD","闪存","Flash","NVMe","固态硬盘"],content:"NVM断电后仍保持数据。类型：闪存（NAND/NOR）、SSD、3D XPoint、NVMe SSD。SSD优势：低延迟、高IOPS、低功耗、抗震。劣势：写入寿命有限、成本较高。SSD不需要磁盘调度。"},
{id:"7.5.1",section:"7.5.1",title:"缓冲技术",keywords:["缓冲","缓冲区","Buffer","缓冲技术","单缓冲","双缓冲","循环缓冲"],content:"缓冲用于缓和CPU与I/O设备速度不匹配。类型：单缓冲（CPU和设备交替工作）、双缓冲（实现并行）、循环缓冲（适合连续数据流）、缓冲池（多进程共享）。"},
{id:"7.5.2",section:"7.5.2",title:"磁盘高速缓存",keywords:["磁盘高速缓存","磁盘缓存","Disk Cache","Buffer Cache","页缓存"],content:"磁盘高速缓存利用内存缓存磁盘数据。命中时直接从内存返回。替换算法：LRU（最近最少使用）、LFU（最不经常使用）、Clock算法。与缓冲的区别：缓存主要减少磁盘访问次数。"},
{id:"7.5.3",section:"7.5.3",title:"提高磁盘I/O速度的其他方法",keywords:["提高磁盘I/O","提高I/O速度","I/O优化","预读","延迟写"],content:"方法包括：优化磁盘调度算法、预读（Read-Ahead）、延迟写（Deferred Write）、虚拟磁盘、优化文件布局、使用SSD、使用RAID技术、内存映射文件。"},
{id:"8.1.1",section:"8.1.1",title:"文件类型",keywords:["文件类型","文件分类","普通文件","目录文件","特殊文件"],content:"按用途：系统文件、用户文件、库文件。按性质：普通文件、目录文件、特殊文件（字符特殊文件、块特殊文件）。按保护级别：只读、读写、可执行等。"},
{id:"8.1.2",section:"8.1.2",title:"文件属性",keywords:["文件属性","文件信息","file attribute","文件元数据"],content:"文件属性包括：文件名、类型、大小、位置、创建时间、修改时间、访问时间、所有者、权限、标志等。存储在FCB或inode中。"},
{id:"8.1.3",section:"8.1.3",title:"文件的操作",keywords:["文件操作","创建文件","删除文件","读写文件"],content:"基本文件操作：创建、删除、打开、关闭、读、写、定位（Seek）、截断、重命名。一般流程：打开文件→读/写文件→关闭文件。"},
{id:"8.1.4",section:"8.1.4",title:"文件访问方式",keywords:["文件访问方式","顺序访问","随机访问","直接访问","索引顺序访问"],content:"顺序访问：按顺序逐一访问，实现简单但搜索慢。随机访问：通过块号直接访问任意记录，即时访问但实现复杂。索引顺序访问：基于顺序访问构建索引，搜索快且支持两种访问方式。"},
{id:"8.2.1",section:"8.2.1",title:"文件结构",keywords:["文件结构","文件组织","无结构文件","有结构文件","流式文件","记录式文件"],content:"无结构文件（流式文件）：字节序列，Unix/Linux采用。有结构文件（记录式文件）：由记录组成，分为定长和变长记录。组织方式：顺序文件、索引文件、索引顺序文件、直接文件（散列文件）。"},
{id:"8.2.2",section:"8.2.2",title:"有结构文件的组织",keywords:["有结构文件","记录式文件","顺序文件","索引文件","索引顺序文件","直接文件"],content:"顺序文件：记录按关键字排列，适合批量处理。索引文件：建立索引表支持快速随机访问。索引顺序文件：结合两者优点。直接文件：通过散列函数映射，访问时间接近O(1)。"},
{id:"8.2.3",section:"8.2.3",title:"文件系统",keywords:["文件系统","file system","文件系统的作用","文件系统的功能"],content:"文件系统功能：存储空间管理、目录管理、读写管理、共享与保护、可靠性管理。层次：逻辑文件系统、文件组织模块、基本文件系统、I/O控制层。常见文件系统：FAT32、NTFS、exFAT、ext2/3/4、APFS。"},
{id:"8.3.1",section:"8.3.1",title:"文件控制块和索引节点",keywords:["FCB","文件控制块","索引节点","inode","fcb和inode"],content:"FCB包含文件名、大小、物理地址、时间、权限等。Unix将FCB拆分：文件名和inode号放目录项，其余放inode。inode包含直接指针（10个）、单级间接指针、二级间接指针、三级间接指针。"},
{id:"8.3.2",section:"8.3.2",title:"单级目录",keywords:["单级目录","flat directory"],content:"整个系统只有一个目录。优点：实现简单。缺点：不允许重名、检索效率低、不支持分类组织。仅适用于简单单用户系统。"},
{id:"8.3.3",section:"8.3.3",title:"两级目录",keywords:["两级目录","主文件目录","用户文件目录","MFD","UFD"],content:"主文件目录（MFD）按用户名索引，用户文件目录（UFD）存放用户文件。优点：解决命名冲突、用户隔离。缺点：不能创建子目录、不支持共享。"},
{id:"8.3.4",section:"8.3.4",title:"树形目录",keywords:["树形目录","多级目录","目录树","绝对路径","相对路径"],content:"树形结构，有根目录。文件通过路径名定位。路径分绝对路径和相对路径。还有无环图目录（支持共享）和通用图目录（允许循环）。优点：层次清晰、可重名、检索效率高、支持共享。"},
{id:"8.3.5",section:"8.3.5",title:"目录的查询",keywords:["目录查询","目录检索","查找文件","按名存取"],content:"根据路径名逐级检索目录项。优化方法：分解法、缓存目录项（dentry cache）、哈希目录、B树/B+树索引、线性搜索。"},

// Build context from knowledge base
function buildContext(query) {
const queryLower = query.toLowerCase();
const relevantKPs = knowledgeBase.filter(kp => {
return kp.keywords.some(kw => queryLower.includes(kw.toLowerCase())) ||
queryLower.includes(kp.title.toLowerCase());
});

let context = '你是一个《操作系统》课程的知识问答助手。请根据以下知识点回答学生的问题。\n\n';
if (relevantKPs.length > 0) {
context += '相关知识点：\n';
relevantKPs.slice(0, 8).forEach(kp => {
context += `【${kp.section} ${kp.title}】${kp.content}\n\n`;
});
} else {
context += '以下是《操作系统》课程第7章（设备管理）和第8章（文件管理）的主要知识点概要：\n';
knowledgeBase.forEach(kp => {
context += `【${kp.section} ${kp.title}】${kp.content.substring(0, 100)}...\n`;
});
}
context += '\n请根据上述知识点，用清晰易懂的方式回答学生的问题。如果问题超出知识点范围，请基于操作系统课程的标准知识进行回答。回答时请包含必要的概念解释、对比分析和实例说明。';
return context;
}

async function callZhipuAPI(query) {
const context = buildContext(query);
const messages = [
{ role: 'system', content: context },
{ role: 'user', content: query }
];

const response = await fetch(API_URL, {
method: 'POST',
headers: {
'Authorization': `Bearer ${apiKey}`,
'Content-Type': 'application/json'
},
body: JSON.stringify({
model: MODEL,
messages: messages,
temperature: 0.7,
max_tokens: 2048
})
});

if (!response.ok) {
if (response.status === 401) {
throw new Error('API Key无效，请在设置中检查您的API Key');
}
throw new Error(`API调用失败: ${response.status}`);
}

const data = await response.json();
return data.choices[0].message.content;
}

function formatMarkdown(text) {
return text
.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
.replace(/\*(.*?)\*/g, '<em>$1</em>')
.replace(/`(.*?)`/g, '<code>$1</code>')
.replace(/\n/g, '<br>');
}

function escapeHtml(text) {
const div = document.createElement('div');

return div.innerHTML;

function calculateDiskScheduling(requests, headStart, direction, algorithm) {
const sorted = [...requests].sort((a, b) => a - b);
let order = [], totalMove = 0, current = headStart;
const remaining = [...requests];

switch(algorithm) {
case 'FCFS':
order = [headStart, ...requests];
for (let i = 1; i < order.length; i++) totalMove += Math.abs(order[i] - order[i-1]);
break;
case 'SSTF':
order = [headStart];
while (remaining.length > 0) {
let nearest = 0, minDist = Math.abs(remaining[0] - current);
for (let i = 1; i < remaining.length; i++) {
const dist = Math.abs(remaining[i] - current);
if (dist < minDist) { minDist = dist; nearest = i; }
}
current = remaining[nearest];
totalMove += minDist;
order.push(current);
remaining.splice(nearest, 1);
}
break;
case 'SCAN':
order = [headStart];
const goUp = direction === 'up';
const left = sorted.filter(r => goUp ? r < headStart : r <= headStart).reverse();
const right = sorted.filter(r => goUp ? r >= headStart : r > headStart);
if (goUp) {
for (const r of right) { order.push(r); totalMove += Math.abs(order[order.length-1] - order[order.length-2]); }
const end = 200;
if (order[order.length-1] !== end) { order.push(end); totalMove += Math.abs(end - order[order.length-2]); }
for (const r of left) { order.push(r); totalMove += Math.abs(order[order.length-1] - order[order.length-2]); }
} else {
for (const r of left) { order.push(r); totalMove += Math.abs(order[order.length-1] - order[order.length-2]); }
if (order[order.length-1] !== 0) { order.push(0); totalMove += Math.abs(0 - order[order.length-2]); }
for (const r of right.reverse()) { order.push(r); totalMove += Math.abs(order[order.length-1] - order[order.length-2]); }
}
break;
case 'C-SCAN':
order = [headStart];
const goUpC = direction === 'up';
const leftC = sorted.filter(r => goUpC ? r < headStart : r <= headStart);
const rightC = sorted.filter(r => goUpC ? r >= headStart : r > headStart);
if (goUpC) {
for (const r of rightC) { order.push(r); totalMove += Math.abs(order[order.length-1] - order[order.length-2]); }
const end = 200;
if (order[order.length-1] !== end) { order.push(end); totalMove += Math.abs(end - order[order.length-2]); }
order.push(0); totalMove += 200;
for (const r of leftC) { order.push(r); totalMove += Math.abs(order[order.length-1] - order[order.length-2]); }
} else {
for (const r of leftC.reverse()) { order.push(r); totalMove += Math.abs(order[order.length-1] - order[order.length-2]); }
order.push(200); totalMove += 200;
order.push(0);
for (const r of rightC.reverse()) { order.push(r); totalMove += Math.abs(order[order.length-1] - order[order.length-2]); }
}
break;
case 'LOOK':
order = [headStart];
const goUpL = direction === 'up';
const leftL = sorted.filter(r => goUpL ? r < headStart : r <= headStart).reverse();
const rightL = sorted.filter(r => goUpL ? r >= headStart : r > headStart);
if (goUpL) {
for (const r of rightL) { order.push(r); totalMove += Math.abs(order[order.length-1] - order[order.length-2]); }
for (const r of leftL) { order.push(r); totalMove += Math.abs(order[order.length-1] - order[order.length-2]); }
} else {
for (const r of leftL) { order.push(r); totalMove += Math.abs(order[order.length-1] - order[order.length-2]); }
for (const r of rightL.reverse()) { order.push(r); totalMove += Math.abs(order[order.length-1] - order[order.length-2]); }
}
break;
case 'C-LOOK':
order = [headStart];
const goUpCL = direction === 'up';
const leftCL = sorted.filter(r => goUpCL ? r < headStart : r <= headStart);
const rightCL = sorted.filter(r => goUpCL ? r >= headStart : r > headStart);
if (goUpCL) {
for (const r of rightCL) { order.push(r); totalMove += Math.abs(order[order.length-1] - order[order.length-2]); }
if (leftCL.length > 0) {
const jump = Math.abs(order[order.length-1] - leftCL[0]);
totalMove += jump;
order.push(leftCL[0]);
for (let i = 1; i < leftCL.length; i++) { order.push(leftCL[i]); totalMove += Math.abs(leftCL[i] - leftCL[i-1]); }
}
} else {
for (const r of leftCL.reverse()) { order.push(r); totalMove += Math.abs(order[order.length-1] - order[order.length-2]); }
if (rightCL.length > 0) {
const jump = Math.abs(order[order.length-1] - rightCL[rightCL.length-1]);
totalMove += jump;
order.push(rightCL[rightCL.length-1]);
for (let i = rightCL.length - 2; i >= 0; i--) { order.push(rightCL[i]); totalMove += Math.abs(rightCL[i+1] - rightCL[i]); }
}
}
break;
}
return { order, totalMove };
}

function runDiskCalc(algorithm) {
const requestsStr = document.getElementById('dcRequests').value;
const headStart = parseInt(document.getElementById('dcHead').value);
const direction = document.getElementById('dcDirection').value;
const requests = requestsStr.split(/[,，\s]+/).map(s => parseInt(s.trim())).filter(n => !isNaN(n));

if (requests.length === 0) {
document.getElementById('dcResult').innerHTML = '<p style="color:red">请输入有效的访问序列</p>';
return;
}

const resultDiv = document.getElementById('dcResult');

if (algorithm === 'ALL') {
const algorithms = ['FCFS', 'SSTF', 'SCAN', 'C-SCAN', 'LOOK', 'C-LOOK'];
let html = '<table><tr><th>算法</th><th>访问顺序</th><th>总移动距离</th></tr>';
algorithms.forEach(algo => {
const result = calculateDiskScheduling(requests, headStart, direction, algo);
html += `<tr><td><strong>${algo}</strong></td><td>${result.order.join(' → ')}</td><td><strong>${result.totalMove}</strong></td></tr>`;
});
html += '</table>';
resultDiv.innerHTML = html;
} else {
const result = calculateDiskScheduling(requests, headStart, direction, algorithm);
const algoNames = {FCFS:'先来先服务',SSTF:'最短寻道时间优先',SCAN:'扫描算法(电梯)',LOOK:'LOOK算法','C-SCAN':'循环扫描','C-LOOK':'循环LOOK'};
let html = `<p><strong>算法：</strong>${algoNames[algorithm] || algorithm}</p>`;
html += `<p><strong>访问顺序：</strong>${result.order.join(' → ')}</p>`;

let moveDetails = [];
for (let i = 1; i < result.order.length; i++) {
const move = Math.abs(result.order[i] - result.order[i-1]);
moveDetails.push(`${result.order[i-1]}→${result.order[i]}: ${move}`);
}
html += `<p><strong>移动过程：</strong></p><pre>${moveDetails.join('\n')}\n总移动距离: ${result.totalMove}</pre>`;
resultDiv.innerHTML = html;
}
}
